version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: cars-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: users_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - cars-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Unified Backend Service (Users + Cars)
  backend-service:
    build:
      context: ./SpringProjectVoiture
      dockerfile: Dockerfile
    container_name: backend-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/users_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cars-network
    restart: on-failure

  # Angular Frontend
  frontend:
    build:
      context: ./miniProjetAngular
      dockerfile: Dockerfile
    container_name: cars-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend-service
    networks:
      - cars-network

networks:
  cars-network:
    driver: bridge

volumes:
  mysql-data:
