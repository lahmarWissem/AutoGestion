<div class="container-fluid p-3 host">
    <!-- Page Header -->
    <div class="d-flex align-items-center mb-4">
        <a routerLink="/home/listroles" class="btn btn-outline-secondary me-3">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h4 class="mb-0" style="color: #005a81;">
            <i class="fas fa-edit me-2"></i>Modifier le rôle
        </h4>
    </div>

    <!-- Form Card -->
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="form-card">

                <!-- Error Alert -->
                <div class="alert alert-danger alert-dismissible fade show" role="alert" *ngIf="err == 1">
                    <i class="fas fa-exclamation-triangle me-2"></i> {{ message }}
                    <button type="button" class="btn-close" (click)="err=0" aria-label="Close"></button>
                </div>

                <form #updateForm="ngForm">
                    <!-- Role Name -->
                    <div class="form-group mb-4">
                        <label class="form-label">Nom du rôle <span class="required">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user-tag"></i></span>
                            <input type="text" [(ngModel)]="role.role" name="role" #roleName="ngModel" required
                                minlength="2" class="form-control" placeholder="Entrez le nom du rôle"
                                [class.is-invalid]="roleName.invalid && roleName.touched"
                                style="text-transform: uppercase;">
                        </div>
                        <div class="invalid-feedback d-block" *ngIf="roleName.invalid && roleName.touched">
                            <span *ngIf="roleName.errors?.['required']">Le nom du rôle est obligatoire.</span>
                            <span *ngIf="roleName.errors?.['minlength']">Le nom doit contenir au moins 2
                                caractères.</span>
                        </div>
                    </div>

                    <!-- Submit -->
                    <div class="d-flex justify-content-between align-items-center mt-4">
                        <a routerLink="/home/listroles" class="btn btn-outline-secondary">
                            <i class="fas fa-times me-2"></i>Annuler
                        </a>
                        <button type="submit" (click)="updateRole()" class="btn btn-primary-custom"
                            [disabled]="updateForm.invalid">
                            <i class="fas fa-save me-2"></i>Enregistrer
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
