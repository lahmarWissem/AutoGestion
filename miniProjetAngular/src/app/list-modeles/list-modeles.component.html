<div class="container-fluid p-3">
    <div class="row mb-4">
        <div class="col-12">
            <div class="card">
                <div class="card-header" style="background-color: #005a81; color: white;">
                    <h5 class="mb-0">{{ajout ? 'Ajouter un Modèle' : 'Modifier le Modèle'}}</h5>
                </div>
                <div class="card-body">
                    <app-update-modele [modele]="updatedMod" [ajout]="ajout" (modeleUpdated)="modeleUpdated($event)">
                    </app-update-modele>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header" style="background-color: #005a81; color: white;">
                    <h5 class="mb-0">Liste des Modèles</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <div *ngIf="!modeles || modeles.length === 0" class="alert alert-info">
                            Aucune donnée disponible
                        </div>
                        <table class="table table-hover" *ngIf="modeles && modeles.length > 0">
                            <thead>
                                <tr>
                                    <th scope="col">Id</th>
                                    <th scope="col">Nom Modèle</th>
                                    <th scope="col">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let mod of modeles; let i = index">
                                    <td data-label="Id">{{mod.idMod}}</td>
                                    <td data-label="Nom">{{mod.nomMod}}</td>
                                    <td data-label="Actions">
                                        <button class="btn btn-sm me-2" style="background-color: #005a81; color: #FFF;"
                                            (click)="updateMod(mod)">
                                            <i class="fas fa-pen"></i>
                                        </button>
                                        <button class="btn btn-sm me-2" (click)="supprimerModele(mod)"
                                            style="background-color: #FF3B3F; color: #FFF;">
                                            <i class="fas fa-times fa-lg"></i>
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
